[workspace]

[package]
name = "voyageai"
version = "0.1.0"
edition = "2021"
authors = ["David Maple <david@parallm.dev>"]
description = "A client for VoyageAI API"
license = "BSD-0-Clause"
repository = "https://github.com/yourusername/client_voyageai"
readme = "README.md"
keywords = ["ai", "client", "api"]
categories = ["api-bindings", "asynchronous"]

[dependencies]
async-trait = "0.1.83"
reqwest = { version = "0.12.8", features = ["json"] }
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
thiserror = "1.0.64"
tokio = { version = "1.40", features = ["full"] }
tiktoken-rs = "0.5.9"
futures = "0.3"
url = "2.5.2"

[features]
default = []

[lib]
name = "voyageai"
path = "src/lib.rs"
[dev-dependencies]
approx = "0.5.1"
